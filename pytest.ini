[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short summary of failures and print captured output
addopts = -ra -q --tb=short

# Treat these markers as known (no warnings)
markers =
    ml: ML pipeline tests (slow, skipped in fast mode)
    api: Tests that hit the api-football sandbox
    bot: Betting bot logic tests — never runs with live BOT_ENABLED=true
    db: Tests requiring a real SQLite connection
