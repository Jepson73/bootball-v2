# nginx.conf — reverse proxy for the betting app on the LXC container
# Place in /etc/nginx/sites-available/betting and symlink to sites-enabled/
#
# Serves:
#   /        → React frontend (built static files)
#   /api/*   → Flask backend on 127.0.0.1:5000
#
# Reachable from outside via your WireGuard tunnel.

server {
    listen 80;
    server_name _;          # match any hostname / WireGuard IP

    # ── React frontend ────────────────────────────────────
    root /var/www/betting/frontend/dist;
    index index.html;

    # SPA fallback — hand all non-asset routes to React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Flask API ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Increase timeouts for long ML inference or retrain requests
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }

    # ── Static assets — long cache ────────────────────────
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Block direct DB / log access ──────────────────────
    location ~* \.(db|db-shm|db-wal|log|pkl|ubj)$ {
        deny all;
        return 404;
    }

    # ── Logging ───────────────────────────────────────────
    access_log /var/log/nginx/betting_access.log;
    error_log  /var/log/nginx/betting_error.log warn;
}
